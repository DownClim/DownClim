name: CD - PyPI

on:
  release:
    types:
      - published
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    if:
      ${{ github.repository == 'DownClim/DownClim' && ( github.event_name ==
      'release' || github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build tarball and wheels
        run: |
          git clean -xdf
          git restore -SW .
          python -m build

      - name: Check built artifacts
        run: |
          python -m twine check --strict dist/*
          if [ -f dist/downclim-0.0.0.tar.gz ]; then
            echo "❌ INVALID VERSION NUMBER"
            exit 1
          else
            echo "✅ Looks good"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: releases
          path: dist

  test-built-dist:
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: downclim
          auto-update-conda: true
          python-version: "3.12"
          channels: conda-forge,nodefaults

      - uses: actions/download-artifact@v4
        with:
          name: releases
          path: dist

      - name: Verify the built wheel is valid
        shell: bash -l {0}
        run: |
          pip install dist/downclim*.whl --force-reinstall --no-deps
          python -c "from downclim import DownClimContext; print('🚀 Import OK')"

  upload-to-test-pypi:
    needs: test-built-dist
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://test.pypi.org/p/downclim
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: releases
          path: dist
      - name: Publish package to TestPyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository_url: https://test.pypi.org/legacy/
          verbose: true

  upload-to-pypi:
    needs: test-built-dist
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/downclim
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: releases
          path: dist
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14.0
        with:
          verbose: true
