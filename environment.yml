# environment.yml — conda environment definition
# The authoritative list is in pyproject.toml under [tool.conda].
name: downclim
channels:
  - conda-forge
  - nodefaults
dependencies:
  # Conda-only packages (no pre-built wheels on PyPI)
  - python>=3.10
  - pip
  - llvmlite
  - numba
  - xesmf
  # Everything else is installed via pip (the package + deps + extras)
  - pip:
      - -e ".[test,dev,docs]"
